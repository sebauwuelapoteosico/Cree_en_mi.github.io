<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina Full SERIA</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #111;
}

button {
  font-size: 2rem;
  padding: 25px 40px;
  border: none;
  border-radius: 15px;
  background-color: #ff0000;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,0,0,0.5);
}

button:hover {
  background-color: #cc0000;
}

#pantallaCompleta {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 9999;
}

/* Ajustes para celulares */
@media (max-width: 600px) {
  button {
    width: 90%;
    font-size: 2.2rem;
    padding: 30px;
  }
}
</style>

<script>
function activar() {
  document.getElementById("pantallaCompleta").style.display = "block";
  document.getElementById("audio").play();
}
</script>

</head>
<body>

<button onclick="activar()">
  PLATA GRATIS AQUI!!!!
</button>

<img
  id="pantallaCompleta"
  src="https://tse1.mm.bing.net/th/id/OIP.oGHlSSOMLSnQwbUYm0avXgHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
  alt="Imagen">

<audio id="audio">
  <source src="jaja.mp3" type="audio/mpeg">
</audio>

</body>
</html>
